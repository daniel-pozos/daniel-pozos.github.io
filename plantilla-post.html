<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TÍTULO DEL POST — Daniel Pozos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0812; --bg2: #110d1c;
    --purple-mid: #533d7a; --purple-light: #9980c4;
    --purple-pale: #c9b8e8; --purple-faint: #e8e0f0;
    --gold: #c8a95a; --gold-dim: #8a7040;
    --text: #ddd4f0; --text-muted: #8a7aaa; --text-dim: #5a4a7a;
    --border-subtle: rgba(83,61,122,0.15);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Outfit', system-ui, sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 3rem; background: rgba(11,8,18,0.85); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--border-subtle); }
  .nav-logo { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--purple-pale); letter-spacing: 0.04em; text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 13px; font-weight: 300; color: var(--text-muted); text-decoration: none; letter-spacing: 0.08em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--purple-pale); }
  .post-wrap { max-width: 680px; margin: 0 auto; padding: 8rem 2rem 6rem; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; margin-bottom: 3rem; transition: color 0.2s; }
  .back-link:hover { color: var(--purple-pale); }
  .post-date { font-size: 10px; letter-spacing: 0.18em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 1rem; }
  .post-title { font-family: var(--serif); font-size: clamp(28px,5vw,48px); font-weight: 500; color: var(--purple-pale); line-height: 1.2; margin-bottom: 3rem; }
  .post-body p { font-family: var(--serif); font-size: 20px; font-weight: 400; color: var(--text-muted); line-height: 1.9; margin-bottom: 1.75rem; }
  .post-body p:first-child { font-size: 24px; font-style: italic; color: var(--purple-pale); }
  .post-divider { width: 30px; height: 0.5px; background: rgba(83,61,122,0.3); margin: 3rem 0; }
  .post-signature { font-family: var(--serif); font-size: 16px; font-style: italic; color: var(--text-dim); }
  footer { border-top: 0.5px solid var(--border-subtle); padding: 2rem 3rem; text-align: center; margin-top: 4rem; }
  .footer-logo { font-family: var(--serif); font-size: 20px; font-style: italic; color: var(--purple-mid); }
  .footer-text { font-size: 12px; font-weight: 300; color: var(--text-dim); margin-top: 0.5rem; }
  @media (max-width: 640px) {
    nav { padding: 1rem 1.5rem; } .nav-links { gap: 1.2rem; }
    .post-wrap { padding: 7rem 1.5rem 4rem; }
    .post-body p { font-size: 18px; } .post-body p:first-child { font-size: 20px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Daniel Pozos</a>
  <ul class="nav-links">
    <li><a href="index.html#sobre">Sobre mí</a></li>
    <li><a href="index.html#libros">Libros</a></li>
    <li><a href="index.html#blog">Blog</a></li>
  </ul>
</nav>

<div class="post-wrap">
  <a href="index.html#blog" class="back-link">← Volver al blog</a>

  <!-- CAMBIA LA FECHA -->
  <div class="post-date">Mes Año</div>

  <!-- CAMBIA EL TÍTULO -->
  <h1 class="post-title">Título de tu post aquí</h1>

  <div class="post-body">
    <!-- ESCRIBE TUS PÁRRAFOS AQUÍ -->
    <!-- Cada párrafo va entre <p> y </p> -->
    <!-- El primer párrafo aparece más grande e itálico automáticamente -->

    <p>Primera frase o idea que abre el post.</p>

    <p>Segundo párrafo con tu contenido.</p>

    <p>Sigue agregando párrafos aquí...</p>

  </div>

  <div class="post-divider"></div>
  <div class="post-signature">— Daniel Pozos</div>
</div>

<footer>
  <div class="footer-logo">Daniel Pozos</div>
  <div class="footer-text">Hecho con palabras y luz de vela · 2026</div>
</footer>

</body>
</html>
